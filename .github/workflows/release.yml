name: Build e Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Definir versão da build (incrementa a cada run, pro auto-update comparar)
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '1.0.${{ github.run_number }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Compilar TypeScript
        run: npx tsc

      - name: Empacotar instalador Windows
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win --x64 --publish never

      - name: Publicar release "latest"
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git tag -d latest 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest \
            "dist-installer/Assistente-Vozzu-Setup.exe" \
            "dist-installer/latest.yml" \
            --title "Assistente Vozzu — última versão (v1.0.${{ github.run_number }})" \
            --notes "**Build automático** — commit \`${{ github.sha }}\`

          ## Instalação
          1. Baixe e execute **Assistente-Vozzu-Setup.exe**
          2. O assistente inicia automaticamente com o Windows
          3. Um ícone aparece na bandeja do sistema (canto inferior direito)
          4. A partir de agora, o assistente avisa sozinho quando sair uma versão nova

          ## HTTPS / domínio próprio
          Se o painel estiver em HTTPS, acesse **https://127.0.0.1:7338** uma vez para aceitar o certificado local. Depois a impressão funciona normalmente." \
            --latest
